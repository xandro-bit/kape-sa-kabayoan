document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ond',serif;font-style:italic;font-size:22px;color:#C2A063;letter-spacing:.02em;\">Building the lounge…<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { dir: 'saddle', spinning: true, ready: false };\n\n  setRoot = (el) => { this.root = el; };\n  setCanvas = (el) => { this.canvas = el; };\n  setLoader = (el) => { this.loader = el; };\n  setMarker = (el) => { this.marker = el; };\n  setMarkerP80 = (el) => { this.markerP80 = el; };\n  setScrim = (el) => { this.scrim = el; };\n  setPanelYou = (el) => { this.panelYou = el; };\n  setPanelP80 = (el) => { this.panelP80 = el; };\n\n  // ---------- palettes ----------\n  palettes = {\n    saddle: { leather:0x845736, leatherDark:0x46301E, wood:0x4A3220, woodTop:0x3E2A1A, accent:0xBC9457, iron:0x2A2724, green:0x2A2724, wall:0x33251A, floor:0x3A2A1C, bone:0xDCCFB4, bg:0x110C08, fog:0x0E0A06, key:0xFFC076, exposure:0.92 },\n    green:  { leather:0x6E4A2E, leatherDark:0x3A2418, wood:0x5A3F2A, woodTop:0x4A3320, accent:0xC2A063, iron:0x242C24, green:0x1F4030, wall:0x222A22, floor:0x3C362A, bone:0xE7E0D0, bg:0x0D110D, fog:0x0A0E0A, key:0xFFD089, exposure:0.88 },\n    bronze: { leather:0xC08A55, leatherDark:0x6A4A32, wood:0x8A6A45, woodTop:0x755334, accent:0xB58A56, iron:0x33302A, green:0x3C5A45, wall:0x4A4036, floor:0x6A5844, bone:0xF4EEE0, bg:0x201810, fog:0x1A1410, key:0xFFE0A8, exposure:1.04 },\n  };\n\n  componentDidMount() {\n    this._mounted = true;\n    this.waitForThree();\n    this._onResize = () => this.resize();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() {\n    this._mounted = false;\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener('resize', this._onResize);\n    if (this.renderer) this.renderer.dispose();\n  }\n\n  waitForThree() {\n    if (window.THREE) { this.init(); return; }\n    let tries = 0;\n    const t = setInterval(() => {\n      if (window.THREE) { clearInterval(t); this.init(); }\n      else if (++tries > 200) { clearInterval(t); }\n    }, 50);\n  }\n\n  // ---------- camera presets (theta,phi,radius,target) ----------\n  views = {\n    hero: { theta: 4.05, phi: 1.12, radius: 6.0, tx: 0, ty: 1.0, tz: 1.7 },\n    apex: { theta: 4.55, phi: 1.16, radius: 3.0, tx: 0, ty: 1.05, tz: 1.6 },\n    lobe: { theta: 5.55, phi: 1.10, radius: 2.3, tx: 1.18, ty: 0.98, tz: 2.05 },\n    top:  { theta: 4.712, phi: 0.30, radius: 7.2, tx: 0, ty: 0.6, tz: 1.9 },\n  };\n\n  init() {\n    const THREE = window.THREE;\n    const P = this.palettes[this.state.dir];\n    const W = this.root.clientWidth, H = this.root.clientHeight;\n\n    const renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true, alpha: false, preserveDrawingBuffer: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(W, H, false);\n    renderer.outputEncoding = THREE.sRGBEncoding;\n    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = P.exposure;\n    renderer.shadowMap.enabled = true;\n    renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n    this.renderer = renderer;\n\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color(P.bg);\n    scene.fog = new THREE.Fog(P.fog, 9, 24);\n    this.scene = scene;\n\n    const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);\n    this.camera = camera;\n\n    // orbit state\n    const v = this.views.hero;\n    this.cam = { theta: v.theta, phi: v.phi, radius: v.radius, tx: v.tx, ty: v.ty, tz: v.tz };\n    this.goal = { ...this.cam };\n\n    this.materials = {};\n    this.buildLights(P);\n    this.buildRoom(P);\n    this.buildBar(P);\n    this.buildEquipment(P);\n    this.buildPourOver(P);\n    this.buildSeating(P);\n    this.buildPendant(P);\n\n    this.bindControls();\n    this.applyCam();\n\n    if (this.loader) { this.loader.style.opacity = '0'; setTimeout(() => { if (this.loader) this.loader.style.display = 'none'; }, 850); }\n    this.setState({ ready: true });\n\n    this.animate();\n  }\n\n  // ---------- material helpers ----------\n  mat(key, color, opts = {}) {\n    const THREE = window.THREE;\n    const m = new THREE.MeshStandardMaterial(Object.assign({ color }, opts));\n    if (!this.materials[key]) this.materials[key] = [];\n    this.materials[key].push(m);\n    return m;\n  }\n\n  buildLights(P) {\n    const THREE = window.THREE;\n    const hemi = new THREE.HemisphereLight(0xfff0d8, 0x221710, 0.20); this.scene.add(hemi); this.hemi = hemi;\n    // daylight rake from side window\n    const day = new THREE.DirectionalLight(0xbcd0e6, 0.30);\n    day.position.set(-7, 6, 3); this.scene.add(day);\n    // warm key from pendant area\n    const key = new THREE.SpotLight(P.key, 12.5, 13, Math.PI / 5.2, 0.62, 1.7);\n    key.position.set(0, 3.05, 1.7);\n    key.target.position.set(0, 0.9, 1.7);\n    key.castShadow = true;\n    key.shadow.mapSize.set(2048, 2048);\n    key.shadow.camera.near = 0.5; key.shadow.camera.far = 12; key.shadow.bias = -0.0004;\n    this.scene.add(key); this.scene.add(key.target); this.keyLight = key;\n    // warm fill from front\n    const fill = new THREE.PointLight(0xffd2a0, 1.05, 10, 2); fill.position.set(-2.8, 2.0, -1.4); this.scene.add(fill); this.fill = fill;\n    const fill2 = new THREE.PointLight(0xffc79a, 0.65, 8, 2); fill2.position.set(2.6, 1.6, -0.6); this.scene.add(fill2); this.fill2 = fill2;\n  }\n\n  buildRoom(P) {\n    const THREE = window.THREE;\n    // floor\n    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), this.mat('floor', P.floor, { roughness: 0.82, metalness: 0.0 }));\n    floor.rotation.x = -Math.PI / 2; floor.position.y = 0; floor.receiveShadow = true; this.scene.add(floor);\n    // back wall (barn-wood) behind bar (+Z)\n    const wallMat = this.mat('wall', P.wall, { roughness: 0.95 });\n    const back = new THREE.Mesh(new THREE.PlaneGeometry(30, 7), wallMat);\n    back.position.set(0, 3.0, 4.2); back.rotation.y = Math.PI; back.receiveShadow = true; this.scene.add(back);\n    // plank lines on back wall\n    const plankMat = this.mat('plank', 0x000000, { roughness: 1, transparent: true, opacity: 0.16 });\n    for (let i = -7; i <= 7; i++) {\n      const p = new THREE.Mesh(new THREE.BoxGeometry(0.025, 7, 0.02), plankMat);\n      p.position.set(i * 0.95, 3.0, 4.18); this.scene.add(p);\n    }\n    // side wall (left, with implied window light)\n    const side = new THREE.Mesh(new THREE.PlaneGeometry(20, 7), wallMat);\n    side.position.set(-8.5, 3.0, -2); side.rotation.y = Math.PI / 2; side.receiveShadow = true; this.scene.add(side);\n    // ceiling beams\n    const beamMat = this.mat('beam', P.woodTop, { roughness: 0.9 });\n    for (let i = -2; i <= 2; i++) {\n      const b = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.42, 22), beamMat);\n      b.position.set(i * 2.4, 4.0, -1); b.castShadow = true; this.scene.add(b);\n    }\n    // tack reference: a leather strap / bridle on back wall\n    const strap = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.5, 0.04), this.mat('strap', P.leatherDark, { roughness: 0.7 }));\n    strap.position.set(-3.6, 3.4, 4.1); this.scene.add(strap);\n    const buckle = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.025, 12, 24), this.mat('accent', P.accent, { roughness: 0.3, metalness: 1.0 }));\n    buckle.position.set(-3.6, 2.75, 4.08); this.scene.add(buckle);\n  }\n\n  // build a curved (ring-sector) extruded solid standing on the floor\n  ringSolid(ri, ro, a0, a1, height, mat, y0) {\n    const THREE = window.THREE;\n    const shape = new THREE.Shape();\n    shape.absarc(0, 0, ro, a0, a1, false);\n    shape.absarc(0, 0, ri, a1, a0, true);\n    const geo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false, curveSegments: 64 });\n    geo.rotateX(Math.PI / 2); // +90: extrudes downward, z = +plan_y (matches atArc convention)\n    const mesh = new THREE.Mesh(geo, mat);\n    mesh.position.y = (y0 || 0) + height; // lift so base sits at y0\n    mesh.castShadow = true; mesh.receiveShadow = true;\n    return mesh;\n  }\n\n  buildBar(P) {\n    const THREE = window.THREE;\n    const cx = 0, cz = 4.0;            // arc center (behind the bar, near back wall)\n    const ri = 1.95, ro = 2.62;        // working radius\n    const a0 = Math.PI * 1.18, a1 = Math.PI * 1.82; // ~115deg sweep, opening toward -Z (front)\n    const grp = new THREE.Group(); grp.position.set(cx, 0, cz); this.scene.add(grp); this.bar = grp;\n\n    // leather body (front + base)\n    const body = this.ringSolid(ri + 0.08, ro, a0, a1, 0.86, this.mat('leather', P.leather, { roughness: 0.62, metalness: 0.0 }), 0);\n    grp.add(body);\n    // reeded/fluted inner base band (barista side) - simple darker wood band\n    const base = this.ringSolid(ri, ri + 0.1, a0, a1, 0.86, this.mat('wood', P.wood, { roughness: 0.75 }), 0);\n    grp.add(base);\n    // wood counter top (overhangs)\n    const top = this.ringSolid(ri - 0.06, ro + 0.1, a0, a1, 0.06, this.mat('woodTop', P.woodTop, { roughness: 0.35, metalness: 0.0 }), 0.86);\n    grp.add(top);\n    // raised guest rail at apex (higher, narrow, outer)\n    const railSpan = 0.34;\n    const mid = (a0 + a1) / 2;\n    const rail = this.ringSolid(ro - 0.04, ro + 0.14, mid - railSpan, mid + railSpan, 0.05, this.mat('woodTop', P.woodTop, { roughness: 0.35 }), 1.06);\n    grp.add(rail);\n    // small posts under rail\n    for (let i = -1; i <= 1; i++) {\n      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.2, 12), this.mat('accent', P.accent, { metalness: 1, roughness: 0.35 }));\n      const a = mid + i * railSpan * 0.7; post.position.set(Math.cos(a) * (ro + 0.04), 0.96, Math.sin(a) * (ro + 0.04)); grp.add(post);\n    }\n    // saddle-stitch seams on leather front (vertical lines)\n    const seamMat = this.mat('seam', 0x000000, { roughness: 1, transparent: true, opacity: 0.22 });\n    for (let k = 0; k <= 10; k++) {\n      const a = a0 + (a1 - a0) * (k / 10);\n      const seam = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.82, 0.012), seamMat);\n      seam.position.set(Math.cos(a) * (ro + 0.005), 0.43, Math.sin(a) * (ro + 0.005)); grp.add(seam);\n    }\n    // brass foot rail along outer convex side\n    const footGeo = new THREE.TorusGeometry(ro + 0.34, 0.028, 14, 120, (a1 - a0));\n    footGeo.rotateX(Math.PI / 2);\n    const foot = new THREE.Mesh(footGeo, this.mat('accent', P.accent, { metalness: 1, roughness: 0.32 }));\n    foot.rotation.y = -a0; // align arc start\n    // TorusGeometry arc starts at angle 0; rotate so it spans a0..a1\n    foot.rotation.y = 0; foot.position.y = 0.18; foot.castShadow = true;\n    // simpler: rebuild torus already in world angles via thetaStart\n    grp.remove(foot);\n    const footGeo2 = new THREE.TorusGeometry(ro + 0.34, 0.03, 14, 140, (a1 - a0));\n    const foot2 = new THREE.Mesh(footGeo2, this.mat('accent', P.accent, { metalness: 1, roughness: 0.3 }));\n    foot2.rotation.x = Math.PI / 2; foot2.rotation.z = -a0; foot2.position.y = 0.18; foot2.castShadow = true; grp.add(foot2);\n\n    // back bar: lower curved shelving behind, smaller arc closer to wall\n    const bri = 1.0, bro = 1.28;\n    const bb = this.ringSolid(bri, bro, a0 + 0.18, a1 - 0.18, 1.7, this.mat('iron', P.iron, { roughness: 0.55, metalness: 0.4 }), 0);\n    grp.add(bb);\n    // shelves\n    for (let s = 0; s < 3; s++) {\n      const sh = this.ringSolid(bri - 0.03, bro + 0.06, a0 + 0.2, a1 - 0.2, 0.03, this.mat('woodTop', P.woodTop, { roughness: 0.4 }), 0.55 + s * 0.5);\n      grp.add(sh);\n      // bone cups on shelves\n      for (let c = 0; c < 5; c++) {\n        const a = (a0 + 0.35) + ((a1 - a0 - 0.7) * (c / 4));\n        const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.035, 0.07, 16), this.mat('bone', P.bone, { roughness: 0.5 }));\n        const rr = (bri + bro) / 2; cup.position.set(Math.cos(a) * rr, 0.6 + s * 0.5, Math.sin(a) * rr); grp.add(cup);\n      }\n    }\n\n    // store arc data for placing equipment (world coords)\n    this.arc = { cx, cz, ri, ro, a0, a1, mid, topY: 0.92 };\n  }\n\n  // place helper: world position from arc-relative (angle, radius)\n  atArc(a, r, y) {\n    return [this.arc.cx + Math.cos(a) * r, y, this.arc.cz + Math.sin(a) * r];\n  }\n\n  buildEquipment(P) {\n    const THREE = window.THREE;\n    const A = this.arc, mid = A.mid, rWork = (A.ri + A.ro) / 2;\n    const matte = () => this.mat('matte', 0x16130F, { roughness: 0.55, metalness: 0.2 });\n    const accent = () => this.mat('accent', P.accent, { metalness: 1, roughness: 0.3 });\n    const walnut = () => this.mat('woodTop', P.woodTop, { roughness: 0.4 });\n    const leather = () => this.mat('leather', P.leather, { roughness: 0.6 });\n\n    // ---- Sanremo You (hero) at apex, front face = -Z (toward guests/camera) ----\n    const you = new THREE.Group();\n    const [yx, , yz] = this.atArc(mid, rWork + 0.06, 0);\n    you.position.set(yx, A.topY, yz); you.rotation.y = -(mid + Math.PI / 2) + Math.PI;\n    const blk = () => this.mat('matte', 0x131110, { roughness: 0.46, metalness: 0.32 });\n    const steel = () => this.mat('steel', 0xC6C9CE, { metalness: 1.0, roughness: 0.2 });\n    const iron = () => this.mat('iron', P.iron, { roughness: 0.5, metalness: 0.6 });\n\n    // base / drip section, main body, top deck (matte black)\n    const base = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.11, 0.50), blk()); base.position.y = 0.055; base.castShadow = true; base.receiveShadow = true; you.add(base);\n    const body = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.215, 0.47), blk()); body.position.y = 0.205; body.castShadow = true; you.add(body);\n    const shoulder = new THREE.Mesh(new THREE.BoxGeometry(0.33, 0.03, 0.48), blk()); shoulder.position.y = 0.318; you.add(shoulder);\n    const deck = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.04, 0.45), blk()); deck.position.y = 0.353; you.add(deck);\n    // raised cup-tray rim + warmer rods (steel)\n    for (const dz of [-0.225, 0.225]) t('accent', P.accent, { metalness: 1, roughness: 0.35, side: THREE.DoubleSide }));\n      shade.position.set(bx, 2.30, bz); grp.add(shade);\n      const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffd9a0 }));\n      bulb.position.set(bx, 2.24, bz); grp.add(bulb);\n    }\n  }\n\n  // ---------- controls ----------\n  bindControls() {\n    const el = this.canvas;\n    let dragging = false, lx = 0, ly = 0;\n    this._moved = 0;\n    const down = (x, y) => { dragging = true; lx = x; ly = y; this._moved = 0; el.style.cursor = 'grabbing'; };\n    const move = (x, y) => {\n      if (!dragging) return;\n      const dx = x - lx, dy = y - ly; lx = x; ly = y;\n      this._moved += Math.abs(dx) + Math.abs(dy);\n      this.goal.theta -= dx * 0.006;\n      this.goal.phi = Math.max(0.18, Math.min(1.45, this.goal.phi - dy * 0.006));\n    };\n    const up = () => { dragging = false; el.style.cursor = 'grab'; };\n    el.addEventListener('mousedown', e => down(e.clientX, e.clientY));\n    window.addEventListener('mousemove', e => move(e.clientX, e.clientY));\n    window.addEventListener('mouseup', up);\n    el.addEventListener('touchstart', e => { const t = e.touches[0]; down(t.clientX, t.clientY); }, { passive: true });\n    el.addEventListener('touchmove', e => { const t = e.touches[0]; move(t.clientX, t.clientY); }, { passive: true });\n    el.addEventListener('touchend', up);\n    el.addEventListener('wheel', e => {\n      e.preventDefault();\n      this.goal.radius = Math.max(1.8, Math.min(13, this.goal.radius + e.deltaY * 0.0035));\n    }, { passive: false });\n    // stop auto-spin on user interaction\n    el.addEventListener('pointerdown', () => { if (this.state.spinning) this.setState({ spinning: false }); });\n    // click (not drag) → raycast pick the machine\n    el.addEventListener('click', e => { if ((this._moved || 0) < 7) this.tryPick(e.clientX, e.clientY); });\n    el.addEventListener('mousemove', e => this.hoverTest(e.clientX, e.clientY));\n  }\n\n  _ndc(cx, cy) {\n    const THREE = window.THREE;\n    const rect = this.canvas.getBoundingClientRect();\n    return new THREE.Vector2(((cx - rect.left) / rect.width) * 2 - 1, -((cy - rect.top) / rect.height) * 2 + 1);\n  }\n  tryPick(cx, cy) {\n    if (!this.camera) return;\n    this._ray = this._ray || new window.THREE.Raycaster();\n    this._ray.setFromCamera(this._ndc(cx, cy), this.camera);\n    if (this.youGroup && this._ray.intersectObject(this.youGroup, true).length) { this.openSpec('you'); return; }\n    if (this.p80Group && this._ray.intersectObject(this.p80Group, true).length) { this.openSpec('p80'); return; }\n  }\n  hoverTest(cx, cy) {\n    if (!this.camera || this._moved > 7) return;\n    this._ray = this._ray || new window.THREE.Raycaster();\n    this._ray.setFromCamera(this._ndc(cx, cy), this.camera);\n    const over = (this.youGroup && this._ray.intersectObject(this.youGroup, true).length > 0)\n      || (this.p80Group && this._ray.intersectObject(this.p80Group, true).length > 0);\n    if (over !== this._over) { this._over = over; this.canvas.style.cursor = over ? 'pointer' : 'grab'; }\n  }\n\n  applyPanels() {\n    const a = this.active;\n    const slide = (el, on) => {\n      if (!el) return;\n      el.style.setProperty('transform', on ? 'translateX(0)' : 'translateX(112%)', 'important');\n      el.style.setProperty('opacity', on ? '1' : '0', 'important');\n      el.style.setProperty('pointer-events', on ? 'auto' : 'none', 'important');\n    };\n    slide(this.panelYou, a === 'you');\n    slide(this.panelP80, a === 'p80');\n    if (this.scrim) {\n      this.scrim.style.setProperty('opacity', a ? '1' : '0', 'important');\n      this.scrim.style.setProperty('pointer-events', a ? 'auto' : 'none', 'important');\n    }\n  }\n  openSpec(which) {\n    this.active = which;\n    if (this.state.spinning) this.setState({ spinning: false });\n    this.applyPanels();\n  }\n  openSpecYou = () => this.openSpec('you');\n  openSpecP80 = () => this.openSpec('p80');\n  closeSpec = () => { this.active = null; this.applyPanels(); };\n\n  applyCam() {\n    const c = this.cam;\n    const x = c.tx + c.radius * Math.sin(c.phi) * Math.cos(c.theta);\n    const y = c.ty + c.radius * Math.cos(c.phi);\n    const z = c.tz + c.radius * Math.sin(c.phi) * Math.sin(c.theta);\n    this.camera.position.set(x, y, z);\n    this.camera.lookAt(c.tx, c.ty, c.tz);\n  }\n\n  animate = () => {\n    if (!this._mounted) return;\n    this._raf = requestAnimationFrame(this.animate);\n    if (this.state.spinning) this.goal.theta -= 0.0016;\n    // lerp toward goal\n    const k = 0.09;\n    for (const key of ['theta', 'phi', 'radius', 'tx', 'ty', 'tz']) {\n      this.cam[key] += (this.goal[key] - this.cam[key]) * k;\n    }\n    this.applyCam();\n    this.renderer.render(this.scene, this.camera);\n    this.updateMarker();\n  };\n\n  updateMarker() {\n    const W = this.root.clientWidth, H = this.root.clientHeight;\n    const place = (el, anchor) => {\n      if (!el || !anchor) return;\n      if (this.active) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; return; }\n      const v = anchor.clone().project(this.camera);\n      if (v.z > 1) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; return; }\n      el.style.left = ((v.x * 0.5 + 0.5) * W) + 'px';\n      el.style.top = ((-v.y * 0.5 + 0.5) * H) + 'px';\n      el.style.opacity = '1';\n      el.style.pointerEvents = 'auto';\n    };\n    place(this.marker, this.youAnchor);\n    place(this.markerP80, this.p80Anchor);\n  }\n\n  resize() {\n    if (!this.renderer || !this.root) return;\n    const W = this.root.clientWidth, H = this.root.clientHeight;\n    this.camera.aspect = W / H; this.camera.updateProjectionMatrix();\n    this.renderer.setSize(W, H, false);\n  }\n\n  // ---------- direction switch ----------\n  applyDirection(dir) {\n    const P = this.palettes[dir];\n    const THREE = window.THREE;\n    const set = (key, color) => { (this.materials[key] || []).forEach(m => m.color.setHex(color)); };\n    set('leather', P.leather); set('leatherDark', P.leatherDark); set('wood', P.wood);\n    set('woodTop', P.woodTop); set('accent', P.accent); set('iron', P.iron);\n    set('wall', P.wall); set('floor', P.floor); set('bone', P.bone); set('strap', P.leatherDark); set('beam', P.woodTop);\n    if (this.scene) { this.scene.background.setHex(P.bg); this.scene.fog.color.setHex(P.fog); }\n    if (this.keyLight) this.keyLight.color.setHex(P.key);\n    if (this.renderer) this.renderer.toneMappingExposure = P.exposure;\n    this.setState({ dir });\n  }\n  pickSaddle = () => this.applyDirection('saddle');\n  pickGreen = () => this.applyDirection('green');\n  pickBronze = () => this.applyDirection('bronze');\n\n  // ---------- view presets ----------\n  goView(name) { Object.assign(this.goal, this.views[name]); if (this.state.spinning) this.setState({ spinning: false }); }\n  viewHero = () => this.goView('hero');\n  viewApex = () => this.goView('apex');\n  viewLobe = () => this.goView('lobe');\n  viewTop = () => this.goView('top');\n\n  toggleSpin = () => this.setState(s => ({ spinning: !s.spinning }));\n\n  // ---------- styles ----------\n  dirBtn(active) {\n    return 'border:none;border-radius:24px;padding:9px 15px;font-size:11px;font-weight:600;letter-spacing:.04em;'\n      + (active\n        ? 'background:#C2A063;color:#1A1308;box-shadow:0 2px 12px rgba(194,160,99,0.4);'\n        : 'background:transparent;color:rgba(244,238,225,0.7);');\n  }\n\n  renderVals() {\n    const d = this.state.dir;\n    const viewBtn = 'border:1px solid rgba(194,160,99,0.3);background:rgba(18,14,11,0.55);backdrop-filter:blur(10px);border-radius:24px;padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.04em;color:rgba(244,238,225,0.82);';\n    return {\n      setRoot: this.setRoot, setCanvas: this.setCanvas, setLoader: this.setLoader,\n      setMarker: this.setMarker, setMarkerP80: this.setMarkerP80,\n      setScrim: this.setScrim, setPanelYou: this.setPanelYou, setPanelP80: this.setPanelP80,\n      openSpecYou: this.openSpecYou, openSpecP80: this.openSpecP80, closeSpec: this.closeSpec,\n      pickSaddle: this.pickSaddle, pickGreen: this.pickGreen, pickBronze: this.pickBronze,\n      viewHero: this.viewHero, viewApex: this.viewApex, viewLobe: this.viewLobe, viewTop: this.viewTop,\n      toggleSpin: this.toggleSpin,\n      btnSaddle: this.dirBtn(d === 'saddle'),\n      btnGreen: this.dirBtn(d === 'green'),\n      btnBronze: this.dirBtn(d === 'bronze'),\n      viewBtn,\n      spinBtn: 'border:1px solid rgba(194,160,99,0.3);background:rgba(18,14,11,0.55);backdrop-filter:blur(10px);border-radius:24px;padding:9px 16px;font-size:11px;font-weight:600;letter-spacing:.06em;color:' + (this.state.spinning ? '#C2A063' : 'rgba(244,238,225,0.82)') + ';',\n      spinLabel: this.state.spinning ? '◐ Auto-rotating' : '▷ Auto-rotate',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
